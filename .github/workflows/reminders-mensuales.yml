name: Recordatorios mensuales (sueldo + comisiones)

on:
  schedule:
    # Diario 10:00 AR = 13:00 UTC. Reclama hasta confirmación.
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Chequear sueldo y comisión del mes, notificar si faltan
        env:
          TOPIC: ${{ secrets.NTFY_TOPIC }}
          APP_URL: https://thomasloekemeyer.github.io/sueldo-tracker/
          SB_URL: https://ljwlanwmnuqgxftlirhh.supabase.co
          SB_KEY: sb_publishable_niVre5BYps9QZVh4qq0UtQ_mMmCrIV0
        run: |
          DIA=$(TZ=America/Argentina/Buenos_Aires date +%d)
          MES_LBL=$(TZ=America/Argentina/Buenos_Aires date +%m/%Y)
          START=$(TZ=America/Argentina/Buenos_Aires date +%Y-%m-01)
          END=$(TZ=America/Argentina/Buenos_Aires date -d "$START + 1 month" +%Y-%m-01)

          echo "AR día ${DIA}, mes ${MES_LBL}, rango [${START}, ${END})"

          # Cuenta ingresos del mes con descripción que contenga keyword
          has_ingreso() {
            local keyword="$1"
            curl -fsS \
              -H "apikey: ${SB_KEY}" \
              -H "Authorization: Bearer ${SB_KEY}" \
              "${SB_URL}/rest/v1/movimientos?select=id&tipo=eq.ingreso&descripcion=ilike.*${keyword}*&fecha=gte.${START}T00:00:00-03:00&fecha=lt.${END}T00:00:00-03:00&limit=1" \
              | jq 'length'
          }

          send_ntfy() {
            local title="$1" body="$2" confirm_lbl="$3" confirm_url="$4"
            curl -fsS -X POST "https://ntfy.sh/${TOPIC}" \
              -H "Title: ${title}" \
              -H "Priority: high" \
              -H "Tags: moneybag" \
              -H "Click: ${APP_URL}" \
              -H "Actions: view, ${confirm_lbl}, ${confirm_url}, clear=true; view, Abrir app, ${APP_URL}, clear=true" \
              -d "${body}"
          }

          # Sueldo: reclamar desde el día 1 hasta que se registre
          SUELDO_COUNT=$(has_ingreso "sueldo")
          if [ "$SUELDO_COUNT" -eq 0 ]; then
            echo "Sueldo ${MES_LBL} pendiente, envío notificación."
            send_ntfy "Sueldo ${MES_LBL}" \
              "Registrar sueldo del mes (2.750.000)" \
              "Confirmar 2.750.000" \
              "${APP_URL}?action=sueldo"
          else
            echo "Sueldo ${MES_LBL} ya registrado (${SUELDO_COUNT}), skip."
          fi

          # Comisión: reclamar desde el día 15 hasta que se registre
          if [ "$DIA" -ge 15 ]; then
            COM_COUNT=$(has_ingreso "comision")
            if [ "$COM_COUNT" -eq 0 ]; then
              echo "Comisión ${MES_LBL} pendiente, envío notificación."
              send_ntfy "Comisiones ${MES_LBL}" \
                "Registrar comisiones del mes" \
                "Cargar comisión" \
                "${APP_URL}?action=comision"
            else
              echo "Comisión ${MES_LBL} ya registrada (${COM_COUNT}), skip."
            fi
          fi
